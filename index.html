    body {

    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #c7c7c7;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 3D Isometric Animation System */
    @keyframes assembly3D {
      0% {
        opacity: 0;
        transform: perspective(2000px) rotateX(45deg) rotateZ(-25deg) translateY(100px) scale(0.8);
        filter: blur(10px);
      }

      100% {
        opacity: 1;
        transform: perspective(2000px) rotateX(0deg) rotateZ(0deg) translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes lineDrawStaff {
      0% {
        height: 0;
        opacity: 0;
      }

      100% {
        height: 32px;
        opacity: 1;
      }
    }

    @keyframes lineDrawVertical {
      0% {
        height: 0;
        opacity: 0;
      }

      100% {
        height: 100%;
        opacity: 1;
      }
    }

    @keyframes lineDrawHorizontal {
      0% {
        width: 0;
        opacity: 0;
      }

      100% {
        width: 100%;
        opacity: 1;
      }
    }

    @keyframes revealStaff {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.9);
        filter: blur(5px);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    .reveal-card {
      opacity: 0;
      animation: revealStaff 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .draw-vertical {
      opacity: 0;
      animation: lineDrawVertical 0.5s ease-out forwards;
    }

    .draw-horizontal {
      opacity: 0;
      animation: lineDrawHorizontal 0.5s ease-out forwards;
    }

    .isometric-card {
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
    }

    .isometric-card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      border-color: rgba(99, 102, 241, 0.5);
    }

    .stagger-1 {
      animation: assembly3D 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .stagger-2 {
      animation: assembly3D 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
      opacity: 0;
    }

    .stagger-3 {
      animation: assembly3D 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
      opacity: 0;
    }

    .stagger-4 {
      animation: assembly3D 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
      opacity: 0;
    }

    .tree-line-animate {
      animation: lineDraw 0.8s cubic-bezier(0.45, 0, 0.55, 1) forwards;
    }
  </style>
